name: Release
 
on:
  release:
    types: [published]
 
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Get repo name
        id: repo
        run: echo "name=${GITHUB_REPOSITORY##*/}" >> $GITHUB_OUTPUT
 
      - name: Generate .bsi index file
        run: |
          python3 - <<'PYEOF'
          import zipfile, os, glob
 
          repo_name = os.environ.get("GITHUB_REPOSITORY", "").split("/")[-1]
          bsi_name  = f"{repo_name}.latest.bsi"
          files     = glob.glob("*.cat") + glob.glob("*.gst")
 
          with zipfile.ZipFile(bsi_name, "w", zipfile.ZIP_DEFLATED) as zf:
              for f in files:
                  zf.write(f)
          print(f"Created {bsi_name} containing: {files}")
          PYEOF
 
      - name: Upload .bsi to release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.bsi"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
