name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get repo name
        id: repo
        run: echo "name=${GITHUB_REPOSITORY##*/}" >> $GITHUB_OUTPUT

      - name: Install catmerge (BSData indexer)
        run: |
          pip install catmerge --quiet

      - name: Generate .bsi index file
        run: |
          catmerge index \
            --output "${{ steps.repo.outputs.name }}.latest.bsi" \
            --gst-only-once \
            *.cat *.gst 2>/dev/null || true
          # If catmerge not available, build a minimal bsi manually
          if [ ! -f "${{ steps.repo.outputs.name }}.latest.bsi" ]; then
            python3 - <<'PYEOF'
          import zipfile, os, glob

          repo_name = os.environ.get("GITHUB_REPOSITORY", "").split("/")[-1]
          bsi_name  = f"{repo_name}.latest.bsi"
          files     = glob.glob("*.cat") + glob.glob("*.gst")

          with zipfile.ZipFile(bsi_name, "w", zipfile.ZIP_DEFLATED) as zf:
              for f in files:
                  zf.write(f)
          print(f"Created {bsi_name} containing: {files}")
          PYEOF
          fi

      - name: Create GitHub Release and upload .bsi
        uses: softprops/action-gh-release@v2
        with:
          files: "*.bsi"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
